version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=devops
      - DB_USER=ram
      - DB_PASS=pavi123
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=devops
      - POSTGRES_USER=ram
      - POSTGRES_PASSWORD=pavi123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
